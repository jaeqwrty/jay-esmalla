<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Neon Dodger guide</title>
  <desc id="desc">A simple arcade guide showing yellow chips to collect, pink hazards to avoid, and a blue player block.</desc>
  <defs>
    <filter id="glowYellow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#090914"/>
      <stop offset="1" stop-color="#140914"/>
    </linearGradient>
  </defs>
  <rect width="760" height="360" fill="url(#bg)"/>
  <g opacity=".22" stroke-width="1">
    <path stroke="#00e5ff" d="M70 40h620M70 100h620M70 160h620M70 220h620M70 280h620"/>
    <path stroke="#ff4fc3" d="M70 40v240M158 40v240M246 40v240M334 40v240M422 40v240M510 40v240M598 40v240M686 40v240"/>
  </g>
  <rect x="70" y="40" width="620" height="240" fill="none" stroke="#30354b"/>
  <rect x="180" y="78" width="54" height="54" fill="#ffe600" filter="url(#glowYellow)"/>
  <rect x="526" y="130" width="54" height="54" fill="#ff4fc3" filter="url(#glowPink)"/>
  <rect x="356" y="207" width="54" height="54" fill="#00e5ff" fill-opacity=".22" stroke="#00e5ff" stroke-width="4" filter="url(#glowBlue)"/>
  <text x="207" y="320" text-anchor="middle" fill="#ffe600" font-family="monospace" font-size="18" letter-spacing="2">COLLECT</text>
  <text x="383" y="320" text-anchor="middle" fill="#00e5ff" font-family="monospace" font-size="18" letter-spacing="2">MOVE</text>
  <text x="553" y="320" text-anchor="middle" fill="#ff4fc3" font-family="monospace" font-size="18" letter-spacing="2">AVOID</text>
</svg>
